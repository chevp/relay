# default-game — runs `relay build` against examples/default-game and
# uploads the resulting .nuna bundle. Focused workflow: no smoke-serve,
# no release publishing — just the actual build.
#
# Triggered on every push and PR so the build is exercised continuously,
# not only when the example folder changes.

name: default-game

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: relay build examples/default-game
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile relay
        run: pnpm build

      - name: Install relay globally from this checkout
        run: npm install -g .

      - name: Run relay build
        working-directory: examples/default-game
        run: |
          mkdir -p ../../dist
          relay build --out ../../dist/default-game.nuna --verbose

      - name: Inspect bundle
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends sqlite3
          echo "── schema ──"
          sqlite3 dist/default-game.nuna '.schema'
          echo "── files ──"
          sqlite3 -header -column dist/default-game.nuna \
            'SELECT path, mime, size, hex(substr(sha256,1,8)) AS sha8 FROM files ORDER BY path;'
          echo "── manifest ──"
          sqlite3 -header -column dist/default-game.nuna 'SELECT * FROM manifest;'
          count=$(sqlite3 dist/default-game.nuna 'SELECT count(*) FROM files;')
          test "$count" -gt 0 || { echo "bundle is empty"; exit 1; }

      - name: Verify CAS mirror
        run: |
          test -d dist/assets || { echo "dist/assets/ missing"; exit 1; }
          bin_count=$(find dist/assets -maxdepth 1 -name '*.bin' | wc -l | tr -d ' ')
          json_count=$(find dist/assets -maxdepth 1 -name '*.json' | wc -l | tr -d ' ')
          test "$bin_count" = "$json_count" || { echo "mismatched .bin/.json: $bin_count vs $json_count"; exit 1; }
          test "$bin_count" -gt 0 || { echo "no CAS entries"; exit 1; }
          # Pair + filename-equals-hash sanity check.
          for bin in dist/assets/*.bin; do
            sha=$(basename "$bin" .bin)
            test -f "dist/assets/$sha.json" || { echo "missing sidecar for $bin"; exit 1; }
            actual=$(sha256sum "$bin" | awk '{print $1}')
            test "$actual" = "$sha" || { echo "hash mismatch: $bin actual=$actual"; exit 1; }
          done
          # Every SHA in the SQLite file table must have a CAS entry.
          sqlite3 dist/default-game.nuna 'SELECT lower(hex(sha256)) FROM files;' | sort -u > /tmp/db_shas.txt
          find dist/assets -maxdepth 1 -name '*.bin' -exec basename {} .bin \; | sort -u > /tmp/cas_shas.txt
          missing=$(comm -23 /tmp/db_shas.txt /tmp/cas_shas.txt)
          test -z "$missing" || { echo "CAS missing entries for:"; echo "$missing"; exit 1; }
          echo "verified $bin_count CAS entries"

      - uses: actions/upload-artifact@v4
        with:
          name: default-game.nuna
          path: dist/default-game.nuna
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: default-game-cas
          path: dist/assets/
          if-no-files-found: error