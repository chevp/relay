<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Scene Explorer</title>
<style>
:root {
  --bg:       #0c0f13;
  --surface:  rgba(14,17,22,0.88);
  --surface2: rgba(20,24,30,0.92);
  --border:   rgba(42,47,55,0.7);
  --border2:  #2a2f37;
  --text:     #c7d2e0;
  --dim:      #6b7280;
  --mute:     #4a5060;
  --accent:   #78aadc;
  --accent2:  #8fbbe6;
  --green:    #6bef9e;
  --red:      #f87171;
  --yellow:   #fbbf24;
  --panel-w:  260px;
  --top-h:    36px;
  --blur:     blur(14px);
  --radius:   10px;
  --font:     -apple-system,"Segoe UI",system-ui,sans-serif;
  --mono:     ui-monospace,SFMono-Regular,Menlo,monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
*::-webkit-scrollbar { width: 6px; }
*::-webkit-scrollbar-thumb { background: #2a2f37; border-radius: 3px; }
*::-webkit-scrollbar-track { background: transparent; }

html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: var(--bg); color: var(--text);
  font: 12px/1.4 var(--font);
  user-select: none;
}

/* ─── Full-screen canvas (JPEG stream background) ─────────────────────── */
#stream {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  object-fit: contain;
  background: var(--bg);
  display: block;
  cursor: grab;
}
#stream:active { cursor: grabbing; }

/* ─── Top bar ─────────────────────────────────────────────────────────── */
#topbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--top-h);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 12px;
  background: var(--surface);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border-bottom: 1px solid var(--border);
  z-index: 100;
  gap: 8px;
}
#topbar .left { display: flex; align-items: center; gap: 8px; flex: 1 1 auto; min-width: 0; }
#topbar .right { display: flex; align-items: center; gap: 12px; flex: 0 0 auto; }

.tb-btn {
  background: transparent; border: none; color: var(--text);
  padding: 4px 8px; border-radius: 6px; cursor: pointer; font: inherit;
  display: inline-flex; align-items: center; gap: 5px;
  transition: background 0.12s;
}
.tb-btn:hover { background: rgba(255,255,255,0.07); }
.tb-btn.active { background: rgba(120,170,220,0.15); color: var(--accent); }
.tb-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

#scene-label {
  color: var(--dim); font-size: 11px; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
#scene-label .name { color: var(--text); font-weight: 500; }

.stat { font-size: 11px; color: var(--dim); white-space: nowrap; }
.stat .val { color: var(--text); font-variant-numeric: tabular-nums; }

#conn-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--mute); flex-shrink: 0;
  transition: background 0.3s;
}
#conn-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }
#conn-dot.error { background: var(--red); }

/* ─── Scene navigator panel ───────────────────────────────────────────── */
#panel {
  position: fixed; top: var(--top-h); left: 0; bottom: 0;
  width: var(--panel-w);
  background: var(--surface);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  z-index: 90;
  transform: translateX(0);
  transition: transform 0.2s ease;
}
#panel.hidden { transform: translateX(calc(-1 * var(--panel-w))); }

.panel-section {
  flex: 0 0 auto;
  padding: 8px 10px 4px;
  font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--mute); font-weight: 600;
}

.search-wrap {
  flex: 0 0 auto;
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
}
.search-wrap input {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border2);
  border-radius: 6px;
  color: var(--text); font: inherit;
  padding: 5px 8px;
  outline: none;
}
.search-wrap input:focus { border-color: var(--accent); }

#scene-tree {
  flex: 1 1 auto;
  overflow-y: auto;
  padding: 4px 0;
}

/* Tree rows */
.tree-group { margin-top: 2px; }
.tree-root {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 10px 5px 12px;
  color: var(--dim); font-size: 11px; font-weight: 600;
  cursor: default; letter-spacing: 0.04em;
}
.tree-root svg { color: var(--accent); }

.tree-item {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 10px 5px 24px;
  color: var(--text); font-size: 12px;
  cursor: pointer; border-radius: 0;
  transition: background 0.1s;
  border-left: 2px solid transparent;
  position: relative;
}
.tree-item:hover { background: rgba(255,255,255,0.05); }
.tree-item.active {
  background: rgba(120,170,220,0.12);
  border-left-color: var(--accent);
  color: var(--accent2);
}
.tree-item svg { flex-shrink: 0; color: var(--dim); }
.tree-item.active svg { color: var(--accent); }
.tree-item .item-name {
  flex: 1 1 auto; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.tree-item .item-tag {
  flex: 0 0 auto;
  font-size: 10px; color: var(--mute);
  background: rgba(255,255,255,0.05);
  border-radius: 3px; padding: 1px 5px;
}
.tree-item.active .item-tag { color: var(--accent); }

.panel-footer {
  flex: 0 0 auto;
  padding: 8px 10px;
  border-top: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 4px;
}
.footer-row {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 11px; color: var(--dim);
}
.footer-row .key { }
.footer-row .val { color: var(--text); font-variant-numeric: tabular-nums; }

/* ─── Camera controls (bottom-right) ──────────────────────────────────── */
#cam-controls {
  position: fixed; right: 16px; bottom: 16px;
  display: flex; align-items: flex-end; gap: 10px;
  z-index: 90;
  transition: opacity 0.2s;
}
#cam-controls.disabled { opacity: 0.3; pointer-events: none; }
.cam-pad {
  display: grid;
  grid-template-columns: repeat(3, 32px);
  grid-template-rows: repeat(3, 32px);
  gap: 3px;
}
.cam-zoom { display: flex; flex-direction: column; gap: 3px; }
.cbtn {
  width: 32px; height: 32px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 7px; color: var(--text);
  cursor: pointer; font-size: 13px;
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  transition: background 0.1s, border-color 0.1s;
}
.cbtn:hover { background: rgba(52,58,68,0.95); border-color: var(--accent); }
.cbtn:active { background: var(--accent); color: #0e1116; border-color: var(--accent); }
.cbtn.c12 { grid-column: 2; grid-row: 1; } /* up    */
.cbtn.c21 { grid-column: 1; grid-row: 2; } /* left  */
.cbtn.c22 { grid-column: 2; grid-row: 2; } /* home  */
.cbtn.c23 { grid-column: 3; grid-row: 2; } /* right */
.cbtn.c32 { grid-column: 2; grid-row: 3; } /* down  */

/* ─── Editor console overlay (bottom-left, above panel) ──────────────── */
#editor-log {
  position: fixed; left: calc(var(--panel-w) + 12px); bottom: 12px;
  max-width: 420px; max-height: 140px;
  overflow-y: auto;
  background: var(--surface);
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font: 11px/1.5 var(--mono);
  color: var(--dim); z-index: 90;
  transition: left 0.2s;
  display: none;
}
#editor-log.has-logs { display: block; }
#panel.hidden ~ #editor-log { left: 12px; }
.log-line { padding: 2px 10px; }
.log-line.warn { color: var(--yellow); }
.log-line.error { color: var(--red); }

/* ─── Empty / loading state ───────────────────────────────────────────── */
#hint {
  position: fixed; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 8px; pointer-events: none;
  color: var(--mute); font-size: 13px; text-align: center;
  z-index: 5;
}
#hint svg { width: 48px; height: 48px; color: #2a2f37; }
#hint.hidden { display: none; }
</style>
</head>
<body>

<canvas id="stream"></canvas>

<div id="hint">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
    <rect x="2" y="3" width="20" height="14" rx="2"/>
    <path d="M8 21h8M12 17v4"/>
  </svg>
  <p>Connecting to iris-preview…</p>
  <p style="font-size:11px">ws://127.0.0.1:9200</p>
</div>

<!-- ── Top bar ────────────────────────────────────────────────────────── -->
<div id="topbar">
  <div class="left">
    <button class="tb-btn active" id="btn-panel" title="Toggle scene navigator (P)">
      <svg viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="2" width="4" height="12" rx="1"/><rect x="7" y="2" width="8" height="2" rx="1"/><rect x="7" y="7" width="8" height="2" rx="1"/><rect x="7" y="12" width="8" height="2" rx="1"/></svg>
      Explorer
    </button>
    <div id="conn-dot"></div>
    <span id="scene-label"><span class="name">no scene</span></span>
  </div>
  <div class="right">
    <span class="stat"><span class="val" id="fps-val">—</span> fps</span>
    <span class="stat"><span class="val" id="ent-val">—</span> entities</span>
    <span class="stat" id="engine-state" style="color:var(--mute)">idle</span>
  </div>
</div>

<!-- ── Scene navigator panel ─────────────────────────────────────────── -->
<div id="panel">
  <div class="panel-section">Scenes</div>
  <div class="search-wrap">
    <input id="search" type="text" placeholder="filter scenes…" spellcheck="false" />
  </div>
  <div id="scene-tree">
    <div style="padding:20px 16px; color:var(--mute); font-size:11px;">
      Loading…
    </div>
  </div>
  <div class="panel-footer">
    <div class="footer-row">
      <span class="key">frame</span>
      <span class="val" id="frame-size">—</span>
    </div>
    <div class="footer-row">
      <span class="key">engine</span>
      <span class="val" id="engine-val">—</span>
    </div>
  </div>
</div>

<!-- ── Editor log ─────────────────────────────────────────────────────── -->
<div id="editor-log"></div>

<!-- ── Camera controls ───────────────────────────────────────────────── -->
<div id="cam-controls" class="disabled">
  <div class="cam-pad">
    <button class="cbtn c12" data-orbit="0,-15" title="Tilt up">▲</button>
    <button class="cbtn c21" data-orbit="-15,0" title="Orbit left">◀</button>
    <button class="cbtn c22" id="btn-reset" title="Reset view">⌂</button>
    <button class="cbtn c23" data-orbit="15,0"  title="Orbit right">▶</button>
    <button class="cbtn c32" data-orbit="0,15"  title="Tilt down">▼</button>
  </div>
  <div class="cam-zoom">
    <button class="cbtn" data-zoom="0.8"  title="Zoom in">+</button>
    <button class="cbtn" data-zoom="1.25" title="Zoom out">−</button>
  </div>
</div>

<script>
'use strict';

// ── Config ────────────────────────────────────────────────────────────────
const PREVIEW_WS = 'ws://127.0.0.1:9200';
const RECONNECT_DELAY = 1200;
const STREAM_FPS = 30;
const STREAM_QUALITY = 80;
const ENTRY_FILES = ['iris.xml', 'cryo.xml', 'lifecycle.xml'];

// ── State ─────────────────────────────────────────────────────────────────
let ws = null;
let reconnTimer = null;
let streaming = false;
let connected = false;
let pendingCalls = new Map();
let callSeq = 0;

let yaw = 0, pitch = 0, radius = 4;
const FOV = 45;
let dragging = false, dragX = 0, dragY = 0, lastSent = 0;

let activeScene = null;           // currently active scene path
let allScenes = [];               // [{alias, path, url, name}]
let filterText = '';

// ── DOM refs ─────────────────────────────────────────────────────────────
const canvas    = document.getElementById('stream');
const ctx2d     = canvas.getContext('2d');
const hint      = document.getElementById('hint');
const connDot   = document.getElementById('conn-dot');
const sceneLabel = document.getElementById('scene-label');
const fpsVal    = document.getElementById('fps-val');
const entVal    = document.getElementById('ent-val');
const engineState = document.getElementById('engine-state');
const engineVal = document.getElementById('engine-val');
const frameSize = document.getElementById('frame-size');
const sceneTree = document.getElementById('scene-tree');
const searchBox = document.getElementById('search');
const panel     = document.getElementById('panel');
const btnPanel  = document.getElementById('btn-panel');
const camCtrl   = document.getElementById('cam-controls');
const editorLog = document.getElementById('editor-log');

// ── Frame rate tracking ───────────────────────────────────────────────────
let frameTimes = [];
let pendingFrame = null;
let decoding = false;

// ── WebSocket ─────────────────────────────────────────────────────────────
function wsConnect() {
  if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
  clearTimeout(reconnTimer);
  ws = new WebSocket(PREVIEW_WS);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    connected = true;
    connDot.className = 'live';
    hint.classList.add('hidden');
    wsCall('streamStart', { fps: STREAM_FPS, quality: STREAM_QUALITY })
      .then(() => {
        streaming = true;
        camCtrl.classList.remove('disabled');
        sendCamera();
      })
      .catch(e => console.warn('streamStart failed:', e));
  };

  ws.onmessage = (e) => {
    if (e.data instanceof ArrayBuffer) {
      onJpegFrame(e.data);
    } else {
      let msg;
      try { msg = JSON.parse(e.data); } catch { return; }
      if (msg.id && pendingCalls.has(msg.id)) {
        const { resolve, reject } = pendingCalls.get(msg.id);
        pendingCalls.delete(msg.id);
        if (msg.ok) resolve(msg.result); else reject(new Error(msg.error || 'call failed'));
      } else if (msg.type === 'editor.status') {
        onEditorStatus(msg.data);
      } else if (msg.type === 'editor.log') {
        onEditorLog(msg.data);
      }
    }
  };

  ws.onclose = () => {
    connected = false; streaming = false;
    connDot.className = 'error';
    camCtrl.classList.add('disabled');
    pendingCalls.forEach(({ reject }) => reject(new Error('disconnected')));
    pendingCalls.clear();
    reconnTimer = setTimeout(wsConnect, RECONNECT_DELAY);
  };

  ws.onerror = () => {};
}

function wsCall(cmd, args, timeoutMs = 10000) {
  return new Promise((resolve, reject) => {
    if (!ws || ws.readyState !== WebSocket.OPEN) { reject(new Error('not connected')); return; }
    const id = `${cmd}-${++callSeq}`;
    const timer = setTimeout(() => {
      pendingCalls.delete(id);
      reject(new Error(`timeout: ${cmd}`));
    }, timeoutMs);
    pendingCalls.set(id, {
      resolve: v => { clearTimeout(timer); resolve(v); },
      reject:  e => { clearTimeout(timer); reject(e); },
    });
    const payload = { id, cmd };
    if (args && Object.keys(args).length) payload.args = args;
    ws.send(JSON.stringify(payload));
  });
}

// ── JPEG frame rendering ──────────────────────────────────────────────────
function onJpegFrame(buffer) {
  pendingFrame = buffer;
  const now = performance.now();
  frameTimes.push(now);
  while (frameTimes.length && now - frameTimes[0] > 1000) frameTimes.shift();
  fpsVal.textContent = String(frameTimes.length);
  frameSize.textContent = (buffer.byteLength / 1024).toFixed(1) + ' KB';
  if (!decoding) drainFrames();
}

async function drainFrames() {
  decoding = true;
  try {
    while (pendingFrame) {
      const buf = pendingFrame; pendingFrame = null;
      const bitmap = await createImageBitmap(new Blob([buf], { type: 'image/jpeg' }));
      if (canvas.width !== bitmap.width)  canvas.width  = bitmap.width;
      if (canvas.height !== bitmap.height) canvas.height = bitmap.height;
      ctx2d.drawImage(bitmap, 0, 0);
      bitmap.close();
    }
  } finally {
    decoding = false;
  }
}

// ── Editor events ─────────────────────────────────────────────────────────
function onEditorStatus(data) {
  if (data.fps !== undefined) fpsVal.textContent = String(Math.round(data.fps));
  if (data.entityCount !== undefined) entVal.textContent = String(data.entityCount);
  if (data.engineState) {
    engineState.textContent = data.engineState;
    engineVal.textContent   = data.engineState;
  }
  if (data.camera) {
    yaw   = data.camera.rotY ?? yaw;
    pitch = data.camera.rotX ?? pitch;
  }
}

const MAX_LOG_LINES = 60;
function onEditorLog(data) {
  editorLog.classList.add('has-logs');
  const line = document.createElement('div');
  line.className = 'log-line ' + (data.level ?? '');
  line.textContent = data.message ?? '';
  editorLog.appendChild(line);
  while (editorLog.childElementCount > MAX_LOG_LINES) editorLog.firstChild.remove();
  editorLog.scrollTop = editorLog.scrollHeight;
}

// ── Camera ────────────────────────────────────────────────────────────────
function currentPose() {
  const dr = Math.PI / 180;
  const y = yaw * dr, p = pitch * dr;
  return {
    posX: radius * Math.sin(y) * Math.cos(p),
    posY: radius * Math.sin(p),
    posZ: radius * Math.cos(y) * Math.cos(p),
    rotX: pitch, rotY: yaw, rotZ: 0, fov: FOV,
  };
}
function sendCamera() {
  if (!connected) return;
  wsCall('setCamera', currentPose()).catch(() => {});
}
function orbit(dYaw, dPitch) {
  yaw = (yaw + dYaw) % 360;
  pitch = Math.max(-80, Math.min(80, pitch + dPitch));
  sendCamera();
}
function zoom(f) {
  radius = Math.max(0.5, Math.min(80, radius * f));
  sendCamera();
}
function resetView() { yaw = 0; pitch = 0; radius = 4; sendCamera(); }

// ── Scene loading ─────────────────────────────────────────────────────────
async function loadScene(scenePath) {
  // Scene switching: evalLua App.loadScene or just update label.
  // The actual iris.xml path is the scene — the user loads it via
  // the container (e.g. kosmos:launch-player). Here we highlight it.
  activeScene = scenePath;
  const name = scenePath.split('/').slice(-2).join('/');
  sceneLabel.innerHTML = `<span class="name">${escHtml(name)}</span>`;
  renderTree();
  // If the daemon is connected, try evalLua to switch maps
  if (connected) {
    const mapDir = scenePath.replace(/\/(iris|cryo|lifecycle)\.xml$/, '');
    wsCall('evalLua', { expr: `App and App.loadMap and App.loadMap("${escJs(mapDir)}")` })
      .catch(() => {}); // best-effort
  }
}

// ── Relay scene discovery ─────────────────────────────────────────────────
async function discoverScenes() {
  sceneTree.innerHTML = '<div style="padding:16px;color:var(--mute);font-size:11px">Loading…</div>';
  try {
    const disc = await fetch('/discover.json').then(r => r.json());
    const found = [];
    for (const [alias, entry] of Object.entries(disc.static || {})) {
      const manifestUrl = entry.url.replace(/\/?$/, '/') + 'manifest.json';
      let manifest;
      try { manifest = await fetch(manifestUrl).then(r => r.json()); } catch { continue; }
      const files = Object.keys(manifest.files || {});
      for (const f of files) {
        const base = f.split('/').pop();
        if (ENTRY_FILES.includes(base)) {
          const segments = f.split('/');
          const sceneName = segments.length >= 2
            ? segments[segments.length - 2]   // parent folder name
            : f.replace(/\.(xml)$/, '');
          found.push({
            alias,
            path: f,                           // relative path in the root
            url: entry.url + f,
            name: sceneName,
            localPath: disc.localPath ? disc.localPath + '/' + f : null,
          });
        }
      }
    }
    allScenes = found;
    if (!allScenes.length) {
      // Fallback: try to show any xml files
      sceneTree.innerHTML =
        '<div style="padding:16px;color:var(--mute);font-size:11px">No scenes found in manifest.<br/>Start iris-preview with a game folder.</div>';
    } else {
      renderTree();
      if (allScenes.length === 1 && !activeScene) loadScene(allScenes[0].localPath || allScenes[0].url);
    }
  } catch (e) {
    sceneTree.innerHTML =
      `<div style="padding:16px;color:var(--mute);font-size:11px">Could not reach relay server.<br/><span style="color:var(--red)">${escHtml(String(e))}</span></div>`;
  }
}

function renderTree() {
  const q = filterText.toLowerCase();
  const visible = allScenes.filter(s =>
    !q || s.name.toLowerCase().includes(q) || s.path.toLowerCase().includes(q)
  );

  if (!visible.length) {
    sceneTree.innerHTML = '<div style="padding:16px;color:var(--mute);font-size:11px">No matches.</div>';
    return;
  }

  // Group by alias
  const groups = {};
  for (const s of visible) {
    (groups[s.alias] ??= []).push(s);
  }

  let html = '';
  for (const [alias, scenes] of Object.entries(groups)) {
    html += `<div class="tree-group">`;
    html += `<div class="tree-root">
      <svg viewBox="0 0 16 16" fill="currentColor" width="12" height="12">
        <path d="M1 3a1 1 0 0 1 1-1h4l2 2h6a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V3z"/>
      </svg>
      ${escHtml(alias)}
    </div>`;
    for (const s of scenes) {
      const isActive = s.localPath === activeScene || s.url === activeScene;
      const entry = s.path.split('/').pop().replace(/\.xml$/, '');
      html += `<div class="tree-item ${isActive ? 'active' : ''}" data-local="${escHtml(s.localPath || '')}" data-url="${escHtml(s.url)}" title="${escHtml(s.path)}">
        <svg viewBox="0 0 16 16" fill="currentColor" width="12" height="12">
          <path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm0 1.5a5.5 5.5 0 1 1 0 11 5.5 5.5 0 0 1 0-11zm0 2.5a1 1 0 0 0-1 1v2.586l-1.293 1.293-.707-.707A.5.5 0 0 0 4.5 10h.086l.707.707a1 1 0 0 0 1.414 0L8 9.414l1.293 1.293a1 1 0 0 0 1.414-1.414L9 7.586V6a1 1 0 0 0-1-1z" opacity="0"/>
          <circle cx="8" cy="8" r="2.5"/>
          <path d="M8 3v1M8 12v1M3 8h1M12 8h1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="item-name">${escHtml(s.name)}</span>
        <span class="item-tag">${escHtml(entry)}</span>
      </div>`;
    }
    html += `</div>`;
  }
  sceneTree.innerHTML = html;

  // Wire clicks
  sceneTree.querySelectorAll('.tree-item').forEach(el => {
    el.addEventListener('click', () => {
      const local = el.dataset.local;
      loadScene(local || el.dataset.url);
    });
  });
}

// ── Event wiring ──────────────────────────────────────────────────────────
btnPanel.addEventListener('click', () => {
  panel.classList.toggle('hidden');
  btnPanel.classList.toggle('active');
});

document.getElementById('btn-reset').addEventListener('click', resetView);

document.querySelectorAll('[data-orbit]').forEach(btn => {
  btn.addEventListener('click', () => {
    const [dy, dp] = btn.dataset.orbit.split(',').map(Number);
    orbit(dy, dp);
  });
});

document.querySelectorAll('[data-zoom]').forEach(btn => {
  btn.addEventListener('click', () => zoom(Number(btn.dataset.zoom)));
});

searchBox.addEventListener('input', () => {
  filterText = searchBox.value.trim();
  renderTree();
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'p' || e.key === 'P') btnPanel.click();
  if (e.key === 'r' || e.key === 'R') resetView();
  if (e.key === 'Escape') { if (!panel.classList.contains('hidden')) btnPanel.click(); }
});

// Canvas drag-to-orbit
canvas.addEventListener('pointerdown', e => {
  dragging = true; dragX = e.clientX; dragY = e.clientY;
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', e => {
  if (!dragging) return;
  const dx = e.clientX - dragX, dy = e.clientY - dragY;
  dragX = e.clientX; dragY = e.clientY;
  yaw = (yaw + dx * 0.4) % 360;
  pitch = Math.max(-80, Math.min(80, pitch + dy * 0.4));
  const now = performance.now();
  if (now - lastSent > 33) { lastSent = now; sendCamera(); }
});
canvas.addEventListener('pointerup', () => { dragging = false; sendCamera(); });
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  zoom(e.deltaY > 0 ? 1.1 : 0.9);
}, { passive: false });

// ── Helpers ───────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escJs(s) {
  return String(s).replace(/\\/g,'\\\\').replace(/"/g,'\\"');
}

// ── Init ──────────────────────────────────────────────────────────────────
wsConnect();
discoverScenes();
</script>
</body>
</html>
